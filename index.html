<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projeto</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 10%;
      background:#111827;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:25px;
    }

    .hero{
      height:85vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    h1{
      font-size:52px;
      margin-bottom:20px;
    }

    p{
      font-size:20px;
      color:#cbd5e1;
      max-width:700px;
      margin-bottom:35px;
    }

    button{
      background:#2563eb;
      color:white;
      border:none;
      padding:15px 35px;
      border-radius:10px;
      font-size:18px;
      cursor:pointer;
    }

    button:hover{
      background:#1d4ed8;
    }
  </style>
</head>

<body>

<header>
  <h2>PROJETO</h2>

  <nav>
    <a href="#">Início</a>
    <a href="#">Recursos</a>
    <a href="#">Contato</a>
  </nav>
</header>

<section class="hero">
  <h1>Bem-vindo</h1>

  <p>
    Este é o início de um site moderno criado do zero.
  </p>

  <button>Começar</button>
</section>

</body>
</html>
